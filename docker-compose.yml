services:
  db:
    image: docker.io/library/postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-projektmanagement}
      POSTGRES_USER: ${POSTGRES_USER:-pm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pm-postgres:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pm} -d ${POSTGRES_DB:-projektmanagement}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:8000
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    ports:
      - "3000:3000"

volumes:
  pm-postgres:
